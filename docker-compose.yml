services:


  db:     
    image: postgres:17-alpine 
    container_name: itk-project-db 
    restart: always 
    env_file:
      - .env

    environment: 
      POSTGRES_USER: ${DB_USER}     
      POSTGRES_PASSWORD: ${DB_PASSWORD} 
      POSTGRES_DB: ${DB_NAME}       

    ports: 
      - "${DB_PORT}:5432" 

    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"] 
      interval: 5s  
      timeout: 5s   
      retries: 5    

    volumes: 
      - itk-project-data:/var/lib/postgresql/data 

  app:
      build: . 
      container_name: itk-project-app
      restart: always
      env_file:
        - .env
      environment:
        - DB_HOST=db
      ports:
        - "8000:8000"
      volumes:
            - .:/app
            - /app/.venv
      depends_on:
        db:
          condition: service_healthy

volumes:
  itk-project-data: